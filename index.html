<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<title>India District Choropleth - React + D3 + Tailwind</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
	<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
	<script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
	<script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
	<script src="https://unpkg.com/@mapbox/polylabel@1.1.0/dist/polylabel.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
	<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
	<style>
		/* Border styles via CSS variables for instant updates without re-render */
		.map-root {
			--district-stroke: #ffffff;
			--district-stroke-width: 0.4px;
			--state-stroke-width: 0.7px;
		}
		.districts path {
			stroke: var(--district-stroke);
			stroke-width: var(--district-stroke-width);
		}
		/* State stroke color fixed (option removed as requested) */
		.states path {
			stroke: #111827;
			stroke-width: var(--state-stroke-width);
		}
	</style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900">
	<div id="root"></div>

	<script type="text/babel">
		const { useEffect, useMemo, useRef, useState } = React;

		function normalizeKey(text) {
			if (text == null) return "";
			return String(text).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]+/g, " ").trim().replace(/\s+/g, " ");
		}
		function pickProperty(props, candidates) {
			for (const k of candidates) {
				if (props && props[k] != null) return props[k];
				const found = props ? Object.keys(props).find(p => p.toLowerCase() === k.toLowerCase()) : null;
				if (found) return props[found];
			}
			return undefined;
		}
		function extractDistrictName(props) {
			return pickProperty(props, ["district_name","district","dt_name","dt_nm","DISTRICT","District","NAME_2","NAME_3","NAME_4","DIST_NAME","DISTNAME","districtname"]);
		}
		function extractStateName(props) {
			return pickProperty(props, ["state_name","state","st_name","st_nm","STATE","STATE_NAME","State","NAME_1","STATENAME","statename"]);
		}
		function extractDistrictId(props) {
			return pickProperty(props, ["district_id","dt_code","dt_code11","DT_CODE","DIST_ID","ID_2","ID"]);
		}
		function buildFeatureKeys(props) {
			const rawDistrict = extractDistrictName(props);
			const rawState = extractStateName(props);
			const rawId = extractDistrictId(props);
			const nkDistrict = normalizeKey(rawDistrict);
			const nkState = normalizeKey(rawState);
			const nkId = rawId != null ? String(rawId).trim() : "";
			const keys = [];
			if (nkDistrict) keys.push(nkDistrict);
			if (nkDistrict && nkState) keys.push(nkDistrict + "|" + nkState);
			if (nkId) keys.push("id:" + nkId);
			return { keys, rawDistrict, rawState, nkDistrict, nkState, nkId };
		}
		function getCanonicalKey(props) {
			const { nkId, nkDistrict, nkState } = buildFeatureKeys(props);
			if (nkId) return "id:" + nkId;
			if (nkDistrict && nkState) return nkDistrict + "|" + nkState;
			return nkDistrict || "";
		}
		function buildUserValueMap(records) {
			const keyNameCandidates = ["district_name","district","name"];
			const stateNameCandidates = ["state_name","state"];
			const idCandidates = ["district_id","id","dt_code","code"];
			const valueCandidates = ["value","val","score","count","metric"];
			const map = new Map();
			for (const row of records) {
				let valueKey = valueCandidates.find(k => row[k] != null && !Number.isNaN(+row[k]));
				if (!valueKey) {
					const numericKeys = Object.keys(row).filter(k => !keyNameCandidates.concat(stateNameCandidates, idCandidates).includes(k));
					valueKey = numericKeys.find(k => row[k] != null && !Number.isNaN(+row[k]));
				}
				const value = valueKey != null ? +row[valueKey] : NaN;
				if (Number.isNaN(value)) continue;

				const nameKey = keyNameCandidates.find(k => row[k] != null);
				const stateKey = stateNameCandidates.find(k => row[k] != null);
				const idKey = idCandidates.find(k => row[k] != null);

				const nkName = nameKey ? normalizeKey(row[nameKey]) : "";
				const nkState = stateKey ? normalizeKey(row[stateKey]) : "";
				const idVal = idKey ? String(row[idKey]).trim() : "";

				if (nkName) {
					const base = nkName;
					if (!map.has(base)) map.set(base, value);
					if (nkState) {
						const withState = base + "|" + nkState;
						if (!map.has(withState)) map.set(withState, value);
					}
				}
				if (idVal) {
					const idKeyed = "id:" + idVal;
					if (!map.has(idKeyed)) map.set(idKeyed, value);
				}
			}
			return map;
		}
		async function loadIndiaMapData() {
			const candidates = [
				"https://raw.githubusercontent.com/udit-001/india-maps-data/main/topojson/all_india_districts.topo.json",
				"https://raw.githubusercontent.com/udit-001/india-maps-data/main/topojson/all_india.topo.json",
				"https://raw.githubusercontent.com/udit-001/india-maps-data/main/geojson/all_india.geojson",
				"https://raw.githubusercontent.com/geohacker/india/master/district/india_district.geojson",
				"https://raw.githubusercontent.com/datameet/india-geojson/master/dist/district/india_district.geojson"
			];
			let lastError = null;
			for (var i = 0; i < candidates.length; i++) {
				const url = candidates[i];
				try {
					const res = await fetch(url, { mode: "cors" });
					if (!res.ok) throw new Error("HTTP " + res.status);
					const data = await res.json();
					return { data, url };
				} catch (err) { lastError = err; }
			}
			throw (lastError || new Error("Failed to fetch any map source"));
		}

		function App() {
			const [mapRaw, setMapRaw] = useState(null);
			const [mapUrl, setMapUrl] = useState("");
			const [mapError, setMapError] = useState("");
			const [features, setFeatures] = useState([]);
			const topoRef = useRef(null);
			const topoObjNameRef = useRef(null);

			const [stateOptions, setStateOptions] = useState([]);
			const [selectedState, setSelectedState] = useState("ALL");

			const [text, setText] = useState(`[
  {"district_name": "Mumbai", "state_name": "Maharashtra", "value": 210},
  {"district_name": "Bengaluru Urban", "state_name": "Karnataka", "value": 160},
  {"district_name": "Kolkata", "state_name": "West Bengal", "value": 130}
]`);
			const [dataError, setDataError] = useState("");
			const [valueMap, setValueMap] = useState(new Map());

			const [overrides, setOverrides] = useState(new Map());
			const [selectedDistrictKey, setSelectedDistrictKey] = useState("");
			const [selectedDistrictLabel, setSelectedDistrictLabel] = useState("");
			const [overrideColor, setOverrideColor] = useState("#ff9900");

			// District border controls (state border color fixed)
			const [districtStroke, setDistrictStroke] = useState("#ffffff");
			const [districtStrokeW, setDistrictStrokeW] = useState(0.4);
			const [stateStrokeW, setStateStrokeW] = useState(0.7);

			// New: label visibility
			const [showLabels, setShowLabels] = useState(true);
			// New: map background color
			const [mapBg, setMapBg] = useState("#ffffff");

			// New: legend visibility and color mode
			const [legendVisible, setLegendVisible] = useState(true);
			const [legendMode, setLegendMode] = useState("auto"); // auto | manual
			const [manualColors, setManualColors] = useState(["#deebf7", "#c6dbef", "#9ecae1", "#6baed6", "#4292c6", "#2171b5", "#084594"]);

			const tooltipRef = useRef(null);
			const containerRef = useRef(null);
			const svgRef = useRef(null);
			const [size, setSize] = useState({ width: 800, height: 640 });

			// Zoom
			const zoomRef = useRef(null);
			const currentTransformRef = useRef(d3.zoomIdentity);

			useEffect(() => {
				(async () => {
					try {
						const { data, url } = await loadIndiaMapData();
						setMapRaw(data); setMapUrl(url); setMapError("");
					} catch (e) { console.error(e); setMapError("Failed to load map data. Please check your connection or try again later."); }
				})();
			}, []);

			useEffect(() => {
				if (!mapRaw) return;
				try {
					if (mapRaw.type === "Topology") {
						const objNames = Object.keys(mapRaw.objects || {});
						const objectName = objNames[0];
						const geo = topojson.feature(mapRaw, mapRaw.objects[objectName]);
						topoRef.current = mapRaw; topoObjNameRef.current = objectName;
						setFeatures(geo.features || []); setMapError("");
					} else if (mapRaw.type === "FeatureCollection") {
						setFeatures(mapRaw.features || []); topoRef.current = null; topoObjNameRef.current = null; setMapError("");
					} else { throw new Error("Unsupported map format"); }
				} catch (e) { console.error(e); setMapError("Map format not supported. Could not parse features."); }
			}, [mapRaw]);

			useEffect(() => {
				if (!features || features.length === 0) return;
				const uniq = new Map();
				for (let i = 0; i < features.length; i++) {
					const raw = extractStateName((features[i] && features[i].properties) || {});
					const norm = normalizeKey(raw);
					if (!norm) continue;
					if (!uniq.has(norm)) uniq.set(norm, raw || "(Unknown)");
				}
				const opts = Array.from(uniq.entries()).map(([norm, label]) => ({ norm, label })).sort((a,b)=>a.label.localeCompare(b.label));
				setStateOptions(opts);
			}, [features]);

			useEffect(() => {
				function setFromEl(el) {
					if (!el) return;
					const w = Math.max(320, el.clientWidth || 800);
					const h = Math.round(w * 0.8);
					setSize({ width: w, height: h });
				}
				setFromEl(containerRef.current);
				if (window.ResizeObserver && containerRef.current) {
					const ro = new ResizeObserver(entries => { for (let i = 0; i < entries.length; i++) setFromEl(entries[i].target); });
					ro.observe(containerRef.current);
					return () => ro.disconnect();
				}
			}, []);

			function handleUpdate() {
				setDataError("");
				try {
					let records = null;
					try {
						const j = JSON.parse(text);
						if (Array.isArray(j)) records = j;
						else if (j && typeof j === "object") records = Object.entries(j).map(([k, v]) => ({ district_name: k, value: v }));
					} catch (e) {}
					if (!records) {
						try { const parsed = d3.csvParse(text); if (parsed && parsed.columns && parsed.length) records = parsed; } catch (e) {}
					}
					if (!records) throw new Error("Invalid data. Provide JSON array/CSV rows or a simple JSON object map.");
					const map = buildUserValueMap(records);
					if (map.size === 0) throw new Error("No numeric values found. Ensure a numeric column like 'value' exists.");
					setValueMap(map); setDataError("");
				} catch (err) { setValueMap(new Map()); setDataError(err.message || "Failed to parse data."); }
			}
			async function handleExcelFile(file) {
				if (!file) return;
				try {
					const buf = await file.arrayBuffer();
					const wb = XLSX.read(buf, { type: "array" });
					const ws = wb.Sheets[wb.SheetNames[0]];
					const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
					setText(JSON.stringify(rows, null, 2));
					setTimeout(handleUpdate, 0);
				} catch (e) { setDataError("Failed to read Excel file. Ensure the first sheet has headers and rows."); }
			}
			function exportToExcel(rows, filename) {
				try {
					const ws = XLSX.utils.json_to_sheet(rows);
					const wb = XLSX.utils.book_new();
					XLSX.utils.book_append_sheet(wb, ws, "Data");
					XLSX.writeFile(wb, filename);
				} catch (e) {}
			}
			function buildCurrentViewRows() {
				const isAll = selectedState === "ALL";
				const featuresToShow = isAll ? features : features.filter(f => normalizeKey(extractStateName((f && f.properties) || {})) === selectedState);
				return featuresToShow.map(d => {
					const props = (d && d.properties) || {};
					const keysObj = buildFeatureKeys(props);
					let val; for (let i=0;i<keysObj.keys.length;i++){const k=keysObj.keys[i];if(valueMap.has(k)){val=valueMap.get(k);break;}}
					const key = getCanonicalKey(props);
					return { district_name: keysObj.rawDistrict || "", state_name: keysObj.rawState || "", value: Number.isFinite(val) ? val : "", override_color: overrides.get(key) || "" };
				});
			}
			function buildFullTemplateRows() {
				return features.map(d => {
					const props = (d && d.properties) || {};
					const keysObj = buildFeatureKeys(props);
					const key = getCanonicalKey(props);
					return { district_name: keysObj.rawDistrict || "", state_name: keysObj.rawState || "", value: "", override_color: overrides.get(key) || "" };
				});
			}

			const quantizeScale = useMemo(() => {
				const vals = Array.from(valueMap.values()).filter(Number.isFinite);
				const palette = legendMode === "manual" ? manualColors : d3.schemeBlues[7];
				if (!vals.length) return d3.scaleQuantize().domain([0, 1]).range(palette);
				const min = d3.min(vals); const max = d3.max(vals); const safeMax = (min === max) ? (min + 1e-6) : max;
				return d3.scaleQuantize().domain([min, safeMax]).range(palette);
			}, [valueMap, legendMode, manualColors]);

			function projectFeatureRings(feature, projection) {
				const rings = []; const geom = feature && feature.geometry; if (!geom) return rings;
				function pushProjected(ring) { const projRing = ring.map(function (xy) { return projection(xy); }); return projRing.filter(function (p) { return Array.isArray(p) && Number.isFinite(p[0]) && Number.isFinite(p[1]); }); }
				if (geom.type === "Polygon") { for (let i=0;i<geom.coordinates.length;i++) rings.push(pushProjected(geom.coordinates[i])); }
				else if (geom.type === "MultiPolygon") { for (let i=0;i<geom.coordinates.length;i++) { const poly = geom.coordinates[i]; for (let j=0;j<poly.length;j++) rings.push(pushProjected(poly[j])); } }
				return rings.filter(function (r) { return r.length >= 3; });
			}
			function interiorPoint(feature, projection) {
				const geom = feature && feature.geometry; if (!geom) return null;
				var best = null; var bestDist = -1;
				function runPolylabel(coords) { try { if (typeof window.polylabel === "function") { const pt = window.polylabel(coords, 1.5); if (pt && Number.isFinite(pt[0]) && Number.isFinite(pt[1])) return pt; } } catch (e) {} return null; }
				if (geom.type === "Polygon") { const projPoly = geom.coordinates.map(function (r) { return r.map(function (c) { return projection(c); }); }); const p = runPolylabel(projPoly); if (p) { best = p; bestDist = (p.distance || 0); } }
				else if (geom.type === "MultiPolygon") { for (let i=0;i<geom.coordinates.length;i++) { const projPoly = geom.coordinates[i].map(function (r) { return r.map(function (c) { return projection(c); }); }); const p = runPolylabel(projPoly); if (p) { const dist = p.distance || 0; if (dist > bestDist) { best = p; bestDist = dist; } } } }
				if (!best) { try { return d3.geoPath(projection).centroid(feature); } catch (e) { return null; } }
				return best;
			}
			function pointInsideFeature(feature, projection, x, y) {
				const rings = projectFeatureRings(feature, projection); if (!rings.length) return false;
				let outer = null, maxA = -Infinity;
				for (let i=0;i<rings.length;i++) { const a = Math.abs(d3.polygonArea(rings[i])); if (a > maxA) { maxA = a; outer = rings[i]; } }
				return outer ? d3.polygonContains(outer, [x, y]) : false;
			}
			function rectsOverlap(a, b, pad) { const p = (typeof pad === "number") ? pad : 1.5; return !(a.x + a.width + p < b.x || b.x + b.width + p < a.x || a.y + a.height + p < b.y || b.y + b.height + p < a.y); }

			// Draw map + zoom
			useEffect(() => {
				if (!features || features.length === 0 || !svgRef.current) return;
				try {
					const svg = d3.select(svgRef.current);
					const width = size.width, height = size.height;
					svg.attr("viewBox", "0 0 " + width + " " + height).attr("width", "100%").attr("height", "100%");
					svg.selectAll("*").remove();

					const isAll = selectedState === "ALL";
					const featuresToShow = isAll ? features : features.filter(f => normalizeKey(extractStateName((f && f.properties) || {})) === selectedState);

					const projection = d3.geoMercator().fitSize([width, height], { type: "FeatureCollection", features: featuresToShow });
					const path = d3.geoPath(projection);

					const viewValues = featuresToShow.map(d => {
						const keysObj = buildFeatureKeys((d && d.properties) || {});
						for (let i = 0; i < keysObj.keys.length; i++) { const k = keysObj.keys[i]; if (valueMap.has(k)) return valueMap.get(k); }
						return undefined;
					}).filter(Number.isFinite);

					let colorScale = quantizeScale;
					if (viewValues.length) {
						const min = d3.min(viewValues); const max = d3.max(viewValues); const safeMax = (min === max) ? (min + 1e-6) : max;
						const palette = legendMode === "manual" ? manualColors : d3.schemeBlues[7];
						colorScale = d3.scaleQuantize().domain([min, safeMax]).range(palette);
					}

					const root = svg.append("g");
					// background rect to capture export background color
					root.append("rect").attr("class", "map-bg").attr("x",0).attr("y",0).attr("width", width).attr("height", height).attr("fill", mapBg);
					// Zoom wrapper
					const zoomLayer = root.append("g").attr("class", "zoom-layer");
					const districtsLayer = zoomLayer.append("g").attr("class", "districts");
					const statesLayer = zoomLayer.append("g").attr("class", "states");
					const labelsLayer = zoomLayer.append("g").attr("class", "labels");

					districtsLayer.selectAll("path").data(featuresToShow).join("path")
						.attr("d", path)
						.attr("fill", d => {
							const props = (d && d.properties) || {};
							const key = getCanonicalKey(props);
							if (overrides.has(key)) return overrides.get(key);
							const keysObj = buildFeatureKeys(props); let val;
							for (let i = 0; i < keysObj.keys.length; i++) { const k = keysObj.keys[i]; if (valueMap.has(k)) { val = valueMap.get(k); break; } }
							return Number.isFinite(val) ? colorScale(val) : "#e5e7eb";
						})
						.style("cursor", "pointer")
						.on("click", (event, d) => {
							const props = (d && d.properties) || {};
							const key = getCanonicalKey(props);
							const keysObj = buildFeatureKeys(props);
							setSelectedDistrictKey(key);
							setSelectedDistrictLabel((keysObj.rawDistrict || "Unknown") + (keysObj.rawState ? ", " + keysObj.rawState : ""));
							const current = overrides.get(key);
							setOverrideColor(current || "#ff9900");
						})
						.on("mousemove", (event, d) => {
							const tipEl = tooltipRef.current; if (!tipEl) return;
							const keysObj = buildFeatureKeys((d && d.properties) || {}); let val;
							for (let i = 0; i < keysObj.keys.length; i++) { const k = keysObj.keys[i]; if (valueMap.has(k)) { val = valueMap.get(k); break; } }
							const props = (d && d.properties) || {}; const key = getCanonicalKey(props); const ov = overrides.get(key);
							const name = keysObj.rawDistrict || "(Unknown district)"; const st = keysObj.rawState ? (", " + keysObj.rawState) : "";
							tipEl.style.opacity = 1;
							tipEl.innerHTML = '<div class="text-sm"><span class="font-semibold">' + name + '</span>' + st + '<br/><span class="text-gray-700">Value:</span> ' + (Number.isFinite(val) ? val : "N/A") + '<br/><span class="text-gray-700">Override:</span> ' + (ov || "None") + '</div>';
							const offset = 12; tipEl.style.left = (event.pageX + offset) + "px"; tipEl.style.top = (event.pageY + offset) + "px";
						})
						.on("mouseleave", () => { const tipEl = tooltipRef.current; if (tipEl) tipEl.style.opacity = 0; });

					// State borders (fixed color; width via CSS var)
					if (topoRef.current && topoObjNameRef.current) {
						try {
							const topology = topoRef.current;
							const object = topology.objects[topoObjNameRef.current];
							const sampleGeo = topojson.feature(topology, object);
							const sample = (sampleGeo.features && sampleGeo.features[0] && sampleGeo.features[0].properties) || {};
							const stateCandidates = ["state_name","state","st_name","st_nm","STATE","STATE_NAME","State","NAME_1","STATENAME"];
							const chosenKey = Object.keys(sample).find(k => stateCandidates.map(s => s.toLowerCase()).includes(k.toLowerCase())) || null;

							if (selectedState === "ALL") {
								const mesh = chosenKey ? topojson.mesh(topology, object, (a, b) => a.properties && b.properties && a.properties[chosenKey] !== b.properties[chosenKey]) : topojson.mesh(topology, object, (a, b) => a !== b);
								statesLayer.append("path").datum(mesh).attr("d", path).attr("fill", "none").attr("pointer-events", "none");
							} else if (object && Array.isArray(object.geometries)) {
								const targetGeoms = object.geometries.filter(g => normalizeKey(((g.properties && g.properties[chosenKey]) || extractStateName(g.properties || {}))) === selectedState);
								if (targetGeoms.length > 0 && topojson.merge) {
									const merged = topojson.merge(topology, targetGeoms);
									statesLayer.append("path").datum(merged).attr("d", path).attr("fill", "none").attr("pointer-events", "none");
								}
							}
						} catch (e) { console.warn("State borders skipped:", e); }
					}

					// Labels (robust placement)
					if (showLabels) {
						const labelCandidates = featuresToShow.map(f => {
							const b = path.bounds(f); const w = Math.max(0, b[1][0] - b[0][0]); const h = Math.max(0, b[1][1] - b[0][1]);
							return { f, area: w * h };
						}).sort((a,b)=>b.area-a.area);

						const placed = []; const MIN_FONT = 8, MAX_FONT = 16;

						function pointInsideFeatureLocal(feature, x, y) {
							const rings = projectFeatureRings(feature, projection); if (!rings.length) return false;
							let outer = null, maxA = -Infinity;
							for (let i=0;i<rings.length;i++) { const a = Math.abs(d3.polygonArea(rings[i])); if (a > maxA) { maxA = a; outer = rings[i]; } }
							return outer ? d3.polygonContains(outer, [x, y]) : false;
						}

						for (let i=0;i<labelCandidates.length;i++) {
							const f = labelCandidates[i].f; const area = labelCandidates[i].area;
							const basePt = interiorPoint(f, projection); if (!basePt) continue;
							let font = Math.max(MIN_FONT, Math.min(MAX_FONT, Math.round(Math.sqrt(area) / (selectedState === "ALL" ? 6 : 4))));
							if (!Number.isFinite(font)) font = 10;

							const attempts = [[basePt[0], basePt[1]]];
							const dirAngles = [0,45,90,135,180,225,270,315].map(a => (a*Math.PI)/180);
							const radii = [font*0.6, font*1.0, font*1.6, font*2.2];
							for (let r=0;r<radii.length;r++) for (let a=0;a<dirAngles.length;a++) attempts.push([basePt[0] + radii[r]*Math.cos(dirAngles[a]), basePt[1] + radii[r]*Math.sin(dirAngles[a])]);

							let placedThis = false;
							for (let j=0;j<attempts.length;j++) {
								const x = attempts[j][0], y = attempts[j][1];
								if (!pointInsideFeatureLocal(f, x, y)) continue;
								const name = extractDistrictName((f && f.properties) || "") || "";
								const gLabel = labelsLayer.append("g").attr("transform", "translate(" + x + "," + y + ")");
								const tOutline = gLabel.append("text").text(name).attr("text-anchor","middle").attr("dy","0.35em").attr("fill","none").attr("stroke","#ffffff").attr("stroke-width",2).style("font-size", font + "px").style("opacity",0);
								const tFill = gLabel.append("text").text(name).attr("text-anchor","middle").attr("dy","0.35em").attr("fill","#111827").style("font-size", font + "px").style("opacity",0);
								const bb = tFill.node().getBBox();
								const rect = { x: x - bb.width/2, y: y - bb.height/2, width: bb.width, height: bb.height };
								let hit = false; for (let k=0;k<placed.length;k++) { if (rectsOverlap(rect, placed[k], 2)) { hit = true; break; } }
								if (hit) { gLabel.remove(); continue; }
								placed.push(rect); tOutline.style("opacity",0.95); tFill.style("opacity",0.95); placedThis = true; break;
							}
							if (!placedThis && font > MIN_FONT) {
								const smaller = Math.max(MIN_FONT, Math.floor(font*0.9));
								const x = basePt[0], y = basePt[1];
								if (pointInsideFeatureLocal(f, x, y)) {
									const name = extractDistrictName((f && f.properties) || "") || "";
									const gLabel = labelsLayer.append("g").attr("transform", "translate(" + x + "," + y + ")");
									const tOutline = gLabel.append("text").text(name).attr("text-anchor","middle").attr("dy","0.35em").attr("fill","none").attr("stroke","#ffffff").attr("stroke-width",2).style("font-size", smaller + "px").style("opacity",0);
									const tFill = gLabel.append("text").text(name).attr("text-anchor","middle").attr("dy","0.35em").attr("fill","#111827").style("font-size", smaller + "px").style("opacity",0);
									const bb = tFill.node().getBBox();
									const rect = { x: x - bb.width/2, y: y - bb.height/2, width: bb.width, height: bb.height };
									let hit = false; for (let k=0;k<placed.length;k++) { if (rectsOverlap(rect, placed[k], 2)) { hit = true; break; } }
									if (hit) gLabel.remove(); else { placed.push(rect); tOutline.style("opacity",0.95); tFill.style("opacity",0.95); }
								}
							}
						}
					}

					// Apply zoom behavior (wheel + drag)
					const zoom = d3.zoom()
						.scaleExtent([1, 10])
						.translateExtent([[0, 0], [width, height]])
						.on("zoom", (event) => {
							zoomLayer.attr("transform", event.transform);
							currentTransformRef.current = event.transform;
						});
					zoomRef.current = zoom;
					svg.call(zoom).on("dblclick.zoom", null);
					// Restore previous transform if any
					if (currentTransformRef.current) {
						zoomLayer.attr("transform", currentTransformRef.current);
						svg.call(zoom.transform, currentTransformRef.current);
					}

					// Legend
					if (legendVisible) {
						const legendWidth = Math.min(260, width - 32), legendHeight = 12, legendX = 16, legendY = height - 32;
						const legend = svg.append("g").attr("transform", "translate(" + legendX + "," + legendY + ")");
						const dom = colorScale.domain(); const d0 = dom[0], d1 = dom[1];
						const legendScale = d3.scaleLinear().domain([d0, d1]).range([0, legendWidth]);
						const bins = colorScale.range().map(function (color) { const ext = colorScale.invertExtent(color); return [ext[0] == null ? d0 : ext[0], ext[1] == null ? d1 : ext[1], color]; });
						legend.selectAll("rect").data(bins).join("rect").attr("x", d => legendScale(d[0])).attr("y", 0).attr("width", d => Math.max(0, legendScale(d[1]) - legendScale(d[0]))).attr("height", legendHeight).attr("fill", d => d[2]);
						const axis = d3.axisBottom(legendScale).ticks(5).tickSize(4);
						legend.append("g").attr("transform", "translate(0," + legendHeight + ")").call(axis).call(g => g.select(".domain").remove());
						legend.append("text").attr("x", 0).attr("y", -6).attr("class", "text-xs fill-gray-700").text("Value");
					}
				} catch (e) { console.error("Render error:", e); }
			}, [features, valueMap, overrides, selectedState, size, quantizeScale, showLabels, legendVisible, legendMode, manualColors, mapBg]);

			// Zoom controls
			function zoomIn() {
				const svg = d3.select(svgRef.current);
				if (!zoomRef.current) return;
				svg.transition().duration(200).call(zoomRef.current.scaleBy, 1.25);
			}
			function zoomOut() {
				const svg = d3.select(svgRef.current);
				if (!zoomRef.current) return;
				svg.transition().duration(200).call(zoomRef.current.scaleBy, 0.8);
			}
			function zoomReset() {
				const svg = d3.select(svgRef.current);
				if (!zoomRef.current) return;
				const t = d3.zoomIdentity;
				svg.transition().duration(200).call(zoomRef.current.transform, t);
				currentTransformRef.current = t;
			}

			// Export helpers
			function svgString() {
				const svgNode = svgRef.current.cloneNode(true);
				// Remove tooltip from export if present
				const tip = svgNode.parentNode && svgNode.parentNode.querySelector ? svgNode.parentNode.querySelector('[data-export-ignore]') : null;
				if (tip && tip.parentNode) tip.parentNode.removeChild(tip);
				const serializer = new XMLSerializer();
				return serializer.serializeToString(svgNode);
			}
			function downloadBlob(content, type, filename) {
				const blob = new Blob([content], { type });
				const url = URL.createObjectURL(blob);
				const a = document.createElement('a');
				a.href = url; a.download = filename; a.click();
				setTimeout(() => URL.revokeObjectURL(url), 500);
			}
			function exportSVG() { downloadBlob(svgString(), 'image/svg+xml;charset=utf-8', 'map.svg'); }
			function exportPNG() {
				const svgData = svgString();
				const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
				const url = URL.createObjectURL(svgBlob);
				const img = new Image();
				const { width, height } = size;
				img.onload = function() {
					const canvas = document.createElement('canvas');
					canvas.width = width; canvas.height = height;
					const ctx = canvas.getContext('2d');
					ctx.fillStyle = mapBg; ctx.fillRect(0,0,width,height);
					ctx.drawImage(img, 0, 0, width, height);
					canvas.toBlob(b => { if (b) downloadBlob(b, 'image/png', 'map.png'); }, 'image/png');
					URL.revokeObjectURL(url);
				};
				img.onerror = function() { URL.revokeObjectURL(url); };
				img.src = url;
			}
			function exportPDF() {
				const svgData = svgString();
				const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
				const url = URL.createObjectURL(svgBlob);
				const img = new Image();
				const { jsPDF } = window.jspdf;
				img.onload = function() {
					const canvas = document.createElement('canvas');
					canvas.width = size.width; canvas.height = size.height;
					const ctx = canvas.getContext('2d');
					ctx.fillStyle = mapBg; ctx.fillRect(0,0,size.width,size.height);
					ctx.drawImage(img, 0, 0, size.width, size.height);
					const dataURL = canvas.toDataURL('image/png');
					const pdf = new jsPDF({ orientation: size.width >= size.height ? 'l' : 'p', unit: 'pt', format: [size.width, size.height] });
					pdf.addImage(dataURL, 'PNG', 0, 0, size.width, size.height);
					pdf.save('map.pdf');
					URL.revokeObjectURL(url);
				};
				img.onerror = function() { URL.revokeObjectURL(url); };
				img.src = url;
			}
			function exportPPTX() {
				const svgData = svgString();
				const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
				const url = URL.createObjectURL(svgBlob);
				const img = new Image();
				img.onload = function() {
					const canvas = document.createElement('canvas');
					canvas.width = size.width; canvas.height = size.height;
					const ctx = canvas.getContext('2d');
					ctx.fillStyle = mapBg; ctx.fillRect(0,0,size.width,size.height);
					ctx.drawImage(img, 0, 0, size.width, size.height);
					const dataURL = canvas.toDataURL('image/png');
					const pptx = new PptxGenJS();
					pptx.addSlide().addImage({ data: dataURL, x: 0, y: 0, w: pptx.width, h: pptx.height });
					pptx.writeFile({ fileName: 'map.pptx' });
					URL.revokeObjectURL(url);
				};
				img.onerror = function() { URL.revokeObjectURL(url); };
				img.src = url;
			}

			return (
				<div className="max-w-7xl mx-auto p-4">
					<h1 className="text-2xl md:text-3xl font-bold tracking-tight mb-4">India District Choropleth</h1>

					<div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
						<div className="lg:col-span-1">
							<div className="bg-white rounded-xl shadow p-4 flex flex-col gap-3">
								<label className="text-sm font-medium text-gray-800">
									State
									<select className="mt-1 w-full p-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" value={selectedState} onChange={e => setSelectedState(e.target.value)}>
										<option value="ALL">All India</option>
										{stateOptions.map(o => (<option key={o.norm} value={o.norm}>{o.label}</option>))}
									</select>
								</label>

								<div className="grid grid-cols-2 gap-3 border border-gray-200 rounded-lg p-3">
									<div className="col-span-2 text-sm font-medium text-gray-800">Borders</div>
									<div>
										<div className="text-xs text-gray-700 mb-1">District border color</div>
										<input type="color" className="w-10 h-10 border border-gray-200 rounded" value={districtStroke} onChange={e => setDistrictStroke(e.target.value)} />
									</div>
									<div>
										<div className="text-xs text-gray-700 mb-1">District border width</div>
										<input type="number" step="0.1" min="0" className="w-full p-2 border border-gray-200 rounded" value={districtStrokeW} onChange={e => setDistrictStrokeW(Math.max(0, parseFloat(e.target.value) || 0))} />
									</div>
									<div className="col-span-2">
										<div className="text-xs text-gray-700 mb-1">State border width</div>
										<input type="number" step="0.1" min="0" className="w-full p-2 border border-gray-200 rounded" value={stateStrokeW} onChange={e => setStateStrokeW(Math.max(0, parseFloat(e.target.value) || 0))} />
									</div>
								</div>

								<div className="grid grid-cols-2 gap-3 border border-gray-200 rounded-lg p-3">
									<div className="col-span-2 text-sm font-medium text-gray-800">Labels</div>
									<label className="inline-flex items-center gap-2 text-sm">
										<input type="checkbox" checked={showLabels} onChange={e => setShowLabels(e.target.checked)} />
										<span>Show labels</span>
									</label>
								</div>

								<div className="grid grid-cols-2 gap-3 border border-gray-200 rounded-lg p-3">
									<div className="col-span-2 text-sm font-medium text-gray-800">Legend</div>
									<label className="inline-flex items-center gap-2 text-sm">
										<input type="checkbox" checked={legendVisible} onChange={e => setLegendVisible(e.target.checked)} />
										<span>Show legend</span>
									</label>
									<div className="col-span-2">
										<div className="text-xs text-gray-700 mb-1">Legend colors</div>
										<select className="w-full p-2 border border-gray-200 rounded" value={legendMode} onChange={e => setLegendMode(e.target.value)}>
											<option value="auto">Auto (Blues)</option>
											<option value="manual">Manual</option>
										</select>
										{legendMode === 'manual' && (
											<div className="mt-2 grid grid-cols-7 gap-2">
												{manualColors.map((c,i) => (
													<input key={i} type="color" className="w-8 h-8 border border-gray-200 rounded" value={c} onChange={e => {
														const next = manualColors.slice(); next[i] = e.target.value; setManualColors(next);
													}} />
												))}
											</div>
										)}
									</div>
								</div>

								<div>
									<div className="text-sm text-gray-600 mb-1">Paste data as JSON or CSV. Required fields:</div>
									<ul className="text-sm text-gray-700 list-disc pl-5">
										<li><span className="font-medium">district_name</span> (or <span className="font-medium">district</span>) and optional <span className="font-medium">state_name</span>, or</li>
										<li><span className="font-medium">district_id</span></li>
										<li><span className="font-medium">value</span> (numeric)</li>
									</ul>
								</div>

								<textarea className="w-full h-40 p-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm" value={text} onChange={e => setText(e.target.value)} placeholder='CSV example:
district_name,state_name,value
Mumbai,Maharashtra,210
Kolkata,West Bengal,130

JSON example:
[{"district_name":"Mumbai","state_name":"Maharashtra","value":210}]' />

								<div className="flex flex-wrap items-center gap-2">
									<button onClick={handleUpdate} className="inline-flex items-center px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 active:bg-blue-800 transition">Update Map</button>
									<label className="inline-flex items-center px-3 py-2 rounded-lg border border-gray-200 hover:bg-gray-50 cursor-pointer">
										<input type="file" accept=".xlsx,.xls" className="hidden" onChange={e => handleExcelFile(e.target.files && e.target.files[0])}/>
										<span className="text-sm text-gray-800">Import Excel (.xlsx)</span>
									</label>
									<button onClick={() => exportToExcel(buildCurrentViewRows(), "choropleth_current_view.xlsx")} className="inline-flex items-center px-3 py-2 rounded-lg border border-gray-200 hover:bg-gray-50"><span className="text-sm text-gray-800">Export Current View</span></button>
									<button onClick={() => exportToExcel(buildFullTemplateRows(), "choropleth_template_all_districts.xlsx")} className="inline-flex items-center px-3 py-2 rounded-lg border border-gray-200 hover:bg-gray-50"><span className="text-sm text-gray-800">Download Template</span></button>
								</div>

								<div className="flex items-center gap-2 pt-1">
									<button onClick={zoomIn} className="px-3 py-2 rounded-lg border border-gray-200 hover:bg-gray-50">Zoom In</button>
									<button onClick={zoomOut} className="px-3 py-2 rounded-lg border border-gray-200 hover:bg-gray-50">Zoom Out</button>
									<button onClick={zoomReset} className="px-3 py-2 rounded-lg border border-gray-200 hover:bg-gray-50">Reset</button>
								</div>

								<div className="mt-2 p-3 border border-gray-200 rounded-lg">
									<div className="text-sm font-medium text-gray-800 mb-2">Manual District Color</div>
									<label className="block text-sm text-gray-700 mb-1">Select District</label>
									<select className="w-full p-2 border border-gray-200 rounded-lg mb-2" value={selectedDistrictKey} onChange={e => {
										const key = e.target.value; setSelectedDistrictKey(key);
										const isAll = selectedState === "ALL";
										const view = isAll ? features : features.filter(f => normalizeKey(extractStateName((f && f.properties) || {})) === selectedState);
										const f = view.find(f => getCanonicalKey((f && f.properties) || {}) === key);
										if (f) { const keysObj = buildFeatureKeys((f && f.properties) || {}); setSelectedDistrictLabel((keysObj.rawDistrict || "Unknown") + (keysObj.rawState ? ", " + keysObj.rawState : "")); } else setSelectedDistrictLabel("");
										const current = overrides.get(key); setOverrideColor(current || "#ff9900");
									}}>
										<option value="">— choose by clicking map or list —</option>
										{(selectedState === "ALL" ? features : features.filter(f => normalizeKey(extractStateName((f && f.properties) || {})) === selectedState)).map(f => {
											const props = (f && f.properties) || {}; const key = getCanonicalKey(props); const keysObj = buildFeatureKeys(props);
											return <option key={key || Math.random()} value={key}>{(keysObj.rawDistrict || "Unknown") + (keysObj.rawState ? ", " + keysObj.rawState : "")}</option>;
										})}
									</select>

									{selectedDistrictKey && <div className="text-xs text-gray-600 mb-2">Selected: {selectedDistrictLabel}</div>}

									<div className="flex items-center gap-3">
										<input type="color" className="w-10 h-10 border border-gray-200 rounded" value={overrideColor} onChange={e => setOverrideColor(e.target.value)} title="Pick color"/>
										<button onClick={() => { if (!selectedDistrictKey) return; const next = new Map(overrides); next.set(selectedDistrictKey, overrideColor); setOverrides(next); }} className="px-3 py-2 rounded-lg bg-emerald-600 text-white hover:bg-emerald-700">Apply Color</button>
										<button onClick={() => { if (!selectedDistrictKey || !overrides.has(selectedDistrictKey)) return; const next = new Map(overrides); next.delete(selectedDistrictKey); setOverrides(next); }} className="px-3 py-2 rounded-lg border border-gray-200 hover:bg-gray-50">Clear Override</button>
									</div>
								</div>

								{dataError && <div className="text-sm text-red-600">{dataError}</div>}

								<div className="text-xs text-gray-500">
									Map source: <span className="font-mono break-all">{mapUrl || "loading..."}</span>
									{mapError && <div className="text-red-600 mt-1">Map load error: {mapError}</div>}
								</div>

								<div className="grid grid-cols-2 gap-3 border border-gray-200 rounded-lg p-3">
									<div className="col-span-2 text-sm font-medium text-gray-800">Map Export</div>
									<div className="flex flex-wrap gap-2">
										<button onClick={exportPNG} className="px-3 py-2 rounded-lg border border-gray-200 hover:bg-gray-50">PNG</button>
										<button onClick={exportSVG} className="px-3 py-2 rounded-lg border border-gray-200 hover:bg-gray-50">SVG</button>
										<button onClick={exportPDF} className="px-3 py-2 rounded-lg border border-gray-200 hover:bg-gray-50">PDF</button>
										<button onClick={exportPPTX} className="px-3 py-2 rounded-lg border border-gray-200 hover:bg-gray-50">PPTX</button>
									</div>
									<div>
										<div className="text-xs text-gray-700 mb-1">Map background</div>
										<input type="color" className="w-10 h-10 border border-gray-200 rounded" value={mapBg} onChange={e => setMapBg(e.target.value)} />
									</div>
								</div>
							</div>
						</div>

						<div className="lg:col-span-2">
							{/* CSS variables for instant border updates */}
							<div
								ref={containerRef}
								className="map-root relative bg-white rounded-xl shadow p-2 md:p-3"
								style={{
									"--district-stroke": districtStroke,
									"--district-stroke-width": districtStrokeW + "px",
									"--state-stroke-width": stateStrokeW + "px"
								}}
							>
								<svg ref={svgRef} className="w-full h-[60vh] min-h-[360px] block rounded-lg"></svg>
								<div ref={tooltipRef} data-export-ignore className="pointer-events-none absolute z-10 bg-white border border-gray-200 shadow-lg rounded-md px-3 py-2" style={{ opacity: 0, left: 0, top: 0 }} />
								{!features.length && !mapError && (
									<div className="absolute inset-0 flex items-center justify-center">
										<div className="text-gray-500 text-sm">Loading map…</div>
									</div>
								)}
							</div>
							<div className="mt-2 text-xs text-gray-600">
								- Scroll or drag to zoom/pan; use buttons for precise control.
							</div>
						</div>
					</div>
				</div>
			);
		}

		const root = ReactDOM.createRoot(document.getElementById("root"));
		root.render(<App />);
	</script>
</body>
</html>
